server:
  port: 8080

spring:
  application:
    name: HospitalServiceSystem

  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/hospitalservicesystem
    username: root
    password: xxxx
    druid:
      # 连接池配置
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      # 检测配置
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      validation-query: SELECT 1
      # 监控统计
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin
      web-stat-filter:
        enabled: true
        url-pattern: /*
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 2000
        wall:
          enabled: true

# MyBatis-Plus 配置
mybatis-plus:
  # 实体类扫描包路径
  type-aliases-package: com.studyback.hospitalservicesystem.entity
  # Mapper XML 文件位置
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    # SQL 日志（默认走 SLF4J，按日志级别输出；需要打印每条 SQL 时改为 org.apache.ibatis.logging.stdout.StdOutImpl）
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    # 驼峰命名转换
    map-underscore-to-camel-case: true
    # 懒加载
    lazy-loading-enabled: true
  global-config:
    db-config:
      # 主键类型 (ASSIGN_ID = 雪花算法)
      id-type: ASSIGN_ID
      # 逻辑删除
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      # 字段填充策略
      insert-strategy: NOT_NULL
      update-strategy: NOT_NULL

# Knife4j API 文档配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn

# JWT 认证配置
jwt:
  secret: hospital-service-system-jwt-secret-key-2026-summer
  access-expiration: 1800000    # access_token 有效期：30分钟
  refresh-expiration: 604800000 # refresh_token 有效期：7天

# 阿里云 DashScope（百炼）配置（旧版 — 保留向后兼容）
dashscope:
  api-key: sk-ws-H.REYMEYD.BIgJ.MEUCIQCWtDtf_942MU0vjizZqEjgd2Y2lg4eyAatMZ_Xaf8RYgIgLiCudv-67DjqFWCHojAqXNH1mCB4Nfl4gZrbfmXH3HM
  model: qwen-turbo
  embedding-model: text-embedding-v1
  # RAG 检索配置
  rag:
    top-k: 5                    # 检索返回的最相关知识条数
    similarity-threshold: 0.3   # 相似度阈值（低于此值的结果将被过滤）

# Agent 智能导诊配置（新版 LangChain4j Agent）
agent:
  enabled: true                                    # Agent 开关，false 时新端点返回 503
  dashscope-api-key: sk-ws-H.REYMEYD.BIgJ.MEUCIQCWtDtf_942MU0vjizZqEjgd2Y2lg4eyAatMZ_Xaf8RYgIgLiCudv-67DjqFWCHojAqXNH1mCB4Nfl4gZrbfmXH3HM
  planner-model: qwen-turbo                        # Planner 模型
  embedding-model: text-embedding-v1               # 向量嵌入模型
  temperature: 0.3                                 # LLM 温度
  max-tokens: 1500                                 # 最大输出 tokens
  memory-window-size: 20                           # ChatMemory 保留轮数
  rag-top-k: 5                                     # RAG 检索 Top-K
  rag-similarity-threshold: 0.3                    # RAG 相似度阈值
  planner-max-retries: 2                           # Planner JSON 解析失败重试次数
